version: '3.8'

services:
  backlink-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backlink_automation_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs:/app/logs
      # Optional: persist playwright cache if needed
      # - playwright-cache:/ms-playwright
    # No ports exposed - internal worker
    # Depends on existing Hermes or Supabase (external)
    networks:
      - default

# Optional named volume for browser cache (uncomment if desired)
# volumes:
#   playwright-cache: